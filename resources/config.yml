# Time before AFK warning (seconds)
afk-time: 180

# Countdown before action
countdown: 10

# Movement sensitivity
movement-threshold: 0.15

# Mode: kick / teleport / transfer
mode: "transfer"

kick:
  message: "§cYou were kicked for being AFK."

teleport:
  world: "afk_world"

transfer:
  servers:
    - "127.0.0.1:19133"
    - "127.0.0.1:19134"

title:
  title: "§cYOU ARE AFK"
  subtitle: "§7You gonna get kicked soon in {cooldown}s"
  sound: "note.bell"

messages:
  actionbar: "§eYou will be moved in {seconds}s"
  afk-on: "§7You are now AFK."
  afk-off: "§aYou are no longer AFK."
  afk-list-header: "§6AFK Players:"
  no-afk: "§aNo players are AFK."

